<app-navbar-home></app-navbar-home>
<app-booking-banner
    *ngIf="isLoggedIn && upcomingBooking()"
    [booking]="upcomingBooking()!">
</app-booking-banner>
<main class="dashboard-content" [class.side-by-side]="isLoggedIn">

  <!-- Search results: flat grid -->
  <section class="venue-section" *ngIf="isSearchActive$ | async">
    <div class="section-header">
      <h2 class="section-title">Search results</h2>
    </div>

    <ng-container *ngIf="(searchResults$ | async) as results">
      <div class="venue-grid" *ngIf="results.length > 0; else pendingEmpty">
        <app-venue-card
          *ngFor="let venue of results"
          [venue]="venue">
        </app-venue-card>
      </div>
    </ng-container>

    <ng-template #pendingEmpty>
      <p class="empty-state">No venue available.</p>
    </ng-template>
  </section>

  <!-- Default dashboard: grouped by location -->
  <ng-container *ngIf="!(isSearchActive$ | async)">
    <section class="venue-section" *ngFor="let section of sections()">
      <div class="section-header">
        <h2 class="section-title">Properties in {{ section.location }}</h2>
        <div class="scroll-btns" *ngIf="!isLoggedIn">
          <button class="scroll-btn" (click)="scroll(section.location, 'left')">&lsaquo;</button>
          <button class="scroll-btn" (click)="scroll(section.location, 'right')">&rsaquo;</button>
        </div>
      </div>
      <div class="venue-carousel" [id]="section.location">
        <div class="card-slide" *ngFor="let venue of section.venues">
          <app-venue-card [venue]="venue"></app-venue-card>
        </div>
      </div>
    </section>
  </ng-container>

</main>

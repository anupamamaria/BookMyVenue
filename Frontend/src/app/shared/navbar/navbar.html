<nav class="global-nav">
  <a routerLink="/" class="nav-logo">
    <span class="material-symbols-outlined home-icon">home</span>
    <span class="logo-text">BookMyVenue</span>
  </a>

  <!-- Venue filter pill (only in venue-filters mode) -->
  <div class="nav-filters" *ngIf="mode === 'venue-filters'">
    <div class="filter-bar-interactive">
      <div class="filter-field-wrapper">
        <label><strong>Location</strong></label>
        <input
          type="text"
          class="filter-text-input"
          placeholder="Search location"
          [(ngModel)]="filterLocation" />
      </div>

      <div class="filter-field-divider"></div>

      <div class="filter-field-wrapper">
        <label><strong>Venue Type</strong></label>
        <mat-select
          class="filter-mat-select"
          panelClass="filter-select-panel"
          [(ngModel)]="filterType">
          <mat-option value="">All types</mat-option>
          <mat-option *ngFor="let t of venueTypes" [value]="t.value">{{ t.label }}</mat-option>
        </mat-select>
      </div>

      <div class="filter-field-divider"></div>

      <div class="filter-field-wrapper">
        <label><strong>Status</strong></label>
        <mat-select
          class="filter-mat-select"
          panelClass="filter-select-panel"
          [(ngModel)]="filterStatus">
          <mat-option value="">All statuses</mat-option>
          <mat-option *ngFor="let s of statuses" [value]="s">{{ s | titlecase }}</mat-option>
        </mat-select>
      </div>
      <button class="filter-search-btn" (click)="onSearchClick()" type="button">
        <span class="material-symbols-outlined">search</span>
      </button>

      <button class="filter-reset-btn" *ngIf="hasActiveFilters" (click)="onClearFilters()" type="button">
        <span class="material-symbols-outlined">restart_alt</span>
      </button>
    </div>

    <span class="result-count">
      <span class="material-symbols-outlined">grid_view</span>
      {{ totalElements }} venue{{ totalElements !== 1 ? 's' : '' }}
    </span>
  </div>

  <div class="nav-user">
    <button class="user-menu-btn" [class.is-logged-in]="isLoggedIn" (click)="toggleUserMenu()">
      <ng-container *ngIf="!isLoggedIn">
        <span class="material-symbols-outlined" style="font-size:20px;color:#717171">menu</span>
        <span class="material-symbols-outlined user-icon-logged-out">person</span>
      </ng-container>
      <ng-container *ngIf="isLoggedIn && currentUser">
        <div class="avatar-circle" [style.background]="avatarColor">{{ userInitials }}</div>
      </ng-container>
    </button>

    <div class="user-dropdown" *ngIf="showUserMenu">
      <div class="dropdown-identity" *ngIf="isLoggedIn && currentUser">
        <div class="avatar-circle avatar-circle--lg" [style.background]="avatarColor">{{ userInitials }}</div>
        <div>
          <p class="identity-name">{{ currentUser.name }}</p>
          <p class="identity-email">{{ currentUser.email }}</p>
        </div>
      </div>
      <hr class="dropdown-divider" *ngIf="isLoggedIn" />
      <ng-container *ngIf="!isLoggedIn">
        <a class="dropdown-item" (click)="openLoginDialog()"><strong>Log in or Signup</strong></a>
      </ng-container>
      <ng-container *ngIf="isLoggedIn">
        <!-- <a class="dropdown-item" (click)="openProfileDialog()">
          <span class="material-symbols-outlined">person</span>My Profile
        </a> -->
        <a routerLink="/bookings" class="dropdown-item" (click)="showUserMenu = false" *ngIf="currentUser?.role === 'USER'">
          <span class="material-symbols-outlined">calendar_month</span>My Bookings
        </a>

        <a class="dropdown-item" (click)="logout()">
          <span class="material-symbols-outlined">logout</span>Log out
        </a>
      </ng-container>
    </div>
  </div>
</nav>

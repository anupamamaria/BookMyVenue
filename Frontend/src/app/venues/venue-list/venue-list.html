<app-loader
  *ngIf="loading()"
   message="Loading your venues...">
</app-loader>

<app-navbar
  mode="venue-filters"
  [locations]="locations"
  [filterLocation]="filterLocation"
  [filterType]="filterType"
  [filterStatus]="filterStatus"
  [totalElements]="totalElements"
  [hasActiveFilters]="hasActiveFilters"
  (searchClicked)="onSearch($event)"
  (filtersCleared)="clearFilters()">
</app-navbar>

<section class="venue-dashboard">
  <header class="venue-header">
    <div>
      <h1>My Venues</h1>
      <p>Manage my venue listings</p>
    </div>
    <div class="overview-stats">
      <button mat-stroked-button class="action-btn" routerLink="/venues/new">
        Add New Venue
      </button>
    </div>
  </header>

  <div class="cards-shell" *ngIf="venues().length > 0; else venueEmpty">
    <div class="venue-grid">
      <article class="venue-card" *ngFor="let venue of venues()"
               [routerLink]="['/venues/manage', venue.venueId]"
               role="link"
               tabindex="0">
        <div class="image-wrapper">
          <img *ngIf="venue.imagePath; else pendingNoImage" [src]="venue.imagePath" [alt]="venue.name" class="venue-image" />
          <ng-template #pendingNoImage>
            <div class="venue-image venue-image--placeholder">No Image</div>
          </ng-template>
          <span class="status-badge" [ngClass]="venue.venueStatus.toLowerCase()">{{ venue.venueStatus }}</span>
        </div>
        <div class="card-content">
          <h3>{{ venue.name }}</h3>
          <div class="card-meta">
            <span class="meta-item">
              <mat-icon>place</mat-icon>{{ venue.location }}
            </span>
            <span class="meta-item">
              <mat-icon>group</mat-icon>500 guests
            </span>
          </div>
        </div>
      </article>
    </div>
  </div>

  <ng-template #venueEmpty>
    <p class="empty-state">No venues match your filters.</p>
  </ng-template>

  <div class="loading-more" *ngIf="loadingMore()">
    <mat-spinner
      diameter="24"
      strokeWidth="3"
      class="loading-spinner">
    </mat-spinner>
    <span>Loading more venues...</span>
  </div>
</section>

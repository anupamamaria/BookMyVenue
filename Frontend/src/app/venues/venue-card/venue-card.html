<a [routerLink]="['/venues', venue.id]" class="venue-card">
  <div class="venue-image-wrapper">
    <img [src]="venue.imageUrl" [alt]="venue.name" class="venue-image" />
    <span *ngIf="venue.featured" class="badge-featured">Featured</span>
  </div>
  <div class="venue-info">
    <div class="venue-header">
      <h6 class="venue-name">{{ venue.name }}</h6>
      <span class="venue-rating">&#9733; {{ venue.rating }}</span>
    </div>
    <p class="venue-location">
      <mat-icon>place</mat-icon>
      {{ venue.location }}</p>
    <p class="venue-capacity">
      <mat-icon>group</mat-icon>
      Up to {{ venue.capacity }} guests</p>
    <p class="venue-price"><strong>{{ venue.price | currency:'INR' }}</strong> per event</p>
  </div>
</a>

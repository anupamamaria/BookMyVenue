<div class="dialog-container">
  <button class="dialog-close" (click)="close()">&times;</button>
  <h2 class="dialog-title">Log in</h2>
  <p class="dialog-subtitle">Welcome back to BookMyVenue</p>

  <div *ngIf="errorMessage" class="dialog-error">{{ errorMessage }}</div>

  <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
    <div class="form-field">
      <label for="login-email">Email</label>
      <input type="email" id="login-email" formControlName="email" placeholder="you@example.com" />
      <div class="field-error" *ngIf="loginForm.get('email')?.touched && loginForm.get('email')?.invalid">
        <small *ngIf="loginForm.get('email')?.errors?.['required']">Email is required.</small>
        <small *ngIf="loginForm.get('email')?.errors?.['email']">Enter a valid email address.</small>
      </div>
    </div>

    <div class="form-field">
      <label for="login-password">Password</label>
      <input type="password" id="login-password" formControlName="password" placeholder="••••••••" />
      <div class="field-error" *ngIf="loginForm.get('password')?.touched && loginForm.get('password')?.invalid">
        <small *ngIf="loginForm.get('password')?.errors?.['required']">Password is required.</small>
        <small *ngIf="loginForm.get('password')?.errors?.['minlength']">Must be at least 6 characters.</small>
      </div>
    </div>

    <button type="submit" class="dialog-btn" [disabled]="loginForm.invalid || loading">
      {{ loading ? 'Signing in...' : 'Sign In' }}
    </button>
  </form>

  <p class="dialog-switch">Don't have an account? <a (click)="switchToSignup()">Sign up</a></p>
</div>
